name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true
      - run: go vet ./...
      - run: go fmt ./...

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true
      - run: go test ./...

  release:
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
            bundle: ""
          - os: linux
            arch: arm64
            ext: ""
            bundle: ""
          - os: darwin
            arch: amd64
            ext: ""
            bundle: "app"
          - os: darwin
            arch: arm64
            ext: ""
            bundle: "app"
          - os: windows
            arch: amd64
            ext: ".exe"
            bundle: ""
          - os: windows
            arch: arm64
            ext: ".exe"
            bundle: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY="chat-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "build/$BINARY" ./cmd/chat

      - name: Bundle macOS .app
        if: matrix.bundle == 'app'
        run: |
          BINARY="chat-${{ matrix.os }}-${{ matrix.arch }}"
          APP_DIR="build/chat.app/Contents/MacOS"
          mkdir -p "$APP_DIR"
          cp "build/$BINARY" "$APP_DIR/chat"
          cat > build/chat.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>chat</string>
            <key>CFBundleIdentifier</key>
            <string>com.go-chat.app</string>
            <key>CFBundleName</key>
            <string>go-chat</string>
            <key>CFBundleVersion</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          EOF

      - name: Archive (macOS .app)
        if: matrix.bundle == 'app'
        run: |
          cd build
          BINARY="chat-${{ matrix.os }}-${{ matrix.arch }}"
          zip -r "${BINARY}.zip" "chat.app"

      - name: Archive (Unix binary)
        if: matrix.os != 'windows' && matrix.bundle != 'app'
        run: |
          cd build
          BINARY="chat-${{ matrix.os }}-${{ matrix.arch }}"
          tar czf "${BINARY}.tar.gz" "${BINARY}"

      - name: Archive (Windows)
        if: matrix.os == 'windows'
        run: |
          cd build
          BINARY="chat-${{ matrix.os }}-${{ matrix.arch }}.exe"
          zip "${BINARY}.zip" "${BINARY}"

      - name: Checksum
        run: |
          cd build
          sha256sum chat-* > checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: build/

  publish:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: build/

      - name: Generate checksums
        run: cd build && sha256sum chat-* > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
          generate_release_notes: true
